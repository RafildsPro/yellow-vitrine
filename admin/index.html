<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yellow Duck | Admin</title>
</head>
<body>
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'RafildsPro/yellow-vitrine',
          branch: 'main',
          base_url: 'https://yellow-vitrine.vercel.app',
          auth_endpoint: 'api/auth'
        },
        media_folder: 'imagens',
        public_folder: 'imagens',
        collections: [
          {
            name: 'caixa-booster', label: 'Caixa de Booster',
            files: [{ label: 'Caixa de Booster', name: 'caixa-booster', file: 'produtos/caixa-booster.json',
              fields: [{ label: 'Produtos', name: 'items', widget: 'list', fields: camposBase() }]
            }]
          },
          {
            name: 'blister-triplo', label: 'Blister Triplo',
            files: [{ label: 'Blister Triplo', name: 'blister-triplo', file: 'produtos/blister-triplo.json',
              fields: [{ label: 'Produtos', name: 'items', widget: 'list', fields: camposBase() }]
            }]
          },
          {
            name: 'blister-quadruplo', label: 'Blister Quádruplo',
            files: [{ label: 'Blister Quádruplo', name: 'blister-quadruplo', file: 'produtos/blister-quadruplo.json',
              fields: [{ label: 'Produtos', name: 'items', widget: 'list', fields: camposBase() }]
            }]
          },
          {
            name: 'colecao-treinador', label: 'Coleção Treinador Avançado',
            files: [{ label: 'Coleção Treinador Avançado', name: 'colecao-treinador', file: 'produtos/colecao-treinador.json',
              fields: [{ label: 'Produtos', name: 'items', widget: 'list', fields: camposBase() }]
            }]
          },
          {
            name: 'box', label: 'Box',
            files: [{ label: 'Box', name: 'box', file: 'produtos/box.json',
              fields: [{ label: 'Produtos', name: 'items', widget: 'list', fields: camposBase() }]
            }]
          },
          {
            name: 'single', label: 'Single',
            files: [{ label: 'Single', name: 'single', file: 'produtos/single.json',
              fields: [{ label: 'Produtos', name: 'items', widget: 'list', fields: camposBase() }]
            }]
          },
          {
            name: 'combo', label: 'Combo de Pacotes',
            files: [{ label: 'Combo de Pacotes', name: 'combo', file: 'produtos/combo.json',
              fields: [{ label: 'Produtos', name: 'items', widget: 'list', fields: camposBase() }]
            }]
          },
          {
            name: 'mini-tin', label: 'Mini Tin',
            files: [{ label: 'Mini Tin', name: 'mini-tin', file: 'produtos/mini-tin.json',
              fields: [{ label: 'Produtos', name: 'items', widget: 'list', fields: camposBase() }]
            }]
          },
          {
            name: 'outros', label: 'Outros',
            files: [{ label: 'Outros', name: 'outros', file: 'produtos/outros.json',
              fields: [{ label: 'Produtos', name: 'items', widget: 'list', fields: camposBase() }]
            }]
          },
          {
            name: 'cartas', label: 'Cartas em Destaque',
            files: [{ label: 'Lista de Cartas', name: 'cartas', file: 'cartas.json',
              fields: [{ label: 'Cartas', name: 'items', widget: 'list', fields: [
                { label: 'Nome da Carta', name: 'nome', widget: 'string' },
                { label: 'Edição', name: 'edicao', widget: 'string' },
                { label: 'Idioma', name: 'lingua', widget: 'select', options: [
                  { label: '🇧🇷 Português (PT-BR)', value: 'br' },
                  { label: '🇺🇸 Inglês (EN)', value: 'us' },
                  { label: '🇯🇵 Japonês (JP)', value: 'jp' },
                  { label: '🇨🇳 Chinês (CN)', value: 'cn' }
                ]},
                { label: 'Preço (R$)', name: 'preco', widget: 'number', value_type: 'float' },
                { label: 'Foto da Carta', name: 'imagem', widget: 'image', required: false },
                { label: 'Condição', name: 'condicao', widget: 'select', options: ['M', 'NM', 'SP', 'MP', 'HP', 'D'] }
              ]}]
            }]
          }
        ]
      }
    });

    function camposBase() {
      return [
        { label: 'Nome', name: 'nome', widget: 'string' },
        { label: 'Edição', name: 'edicao', widget: 'string', hint: 'Ex: Rivais Predestinados, 151...' },
        { label: 'Idioma', name: 'lingua', widget: 'select', options: [
          { label: '🇧🇷 Português (PT-BR)', value: 'br' },
          { label: '🇺🇸 Inglês (EN)', value: 'us' },
          { label: '🇯🇵 Japonês (JP)', value: 'jp' },
          { label: '🇨🇳 Chinês (CN)', value: 'cn' }
        ]},
        { label: 'Preço (R$)', name: 'preco', widget: 'number', value_type: 'float' },
        { label: 'Foto', name: 'imagem', widget: 'image', required: false },
        { label: '🔥 Último em estoque?', name: 'ultimo', widget: 'boolean', default: false, required: false }
      ];
    }
  </script>
</body>
</html>
